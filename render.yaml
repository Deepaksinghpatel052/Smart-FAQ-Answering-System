services:
  - type: web
    name: faq-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Render dashboard mein manually set karo
      - key: USE_LLM
        value: true
